site_name: Ministry of Health Digital Knowledge Platform
site_description: Ministry of Health digital publications platform
theme:
  name: material
  logo: assets/moh-logo.png
  favicon: assets/moh-logo.png
  features:
    - navigation.sections
    - content.tabs.link
    # - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - navigation.indexes
    - navigation.path
    # - navigation.tabs
    - navigation.instant
plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - glightbox
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true
